<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodie's Delight</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

    <header>
        <h1>🍽 Foodie's Delight</h1>
        <p>Delicious Food Delivered Fresh</p>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h2>Discover Amazing Food</h2>
            <p>Fresh ingredients, tasty meals, and beautiful dining experiences.</p>

            <button>Order Now</button>
        </div>
    </section>

    <section class="menu-section">

        <h2>Our Popular Menu</h2>

        <div class="menu-container">

            {% for food in foods %}

            <div class="food-card">

                <img src="{{ food.image }}" alt="{{ food.name }}">

                <div class="card-content">

                    <h3>{{ food.name }}</h3>

                    <p class="price">{{ food.price }}</p>

                    <button>Add to Cart</button>

                </div>

            </div>

            {% endfor %}

        </div>

    </section>

    <footer>
        <p>© 2026 Foodie's Delight | AWS ECS Fargate Deployment Demo</p>
    </footer>

</body>
</html>
