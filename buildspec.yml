version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws --version
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - REGION=us-east-1
      - REPOSITORY_URI=$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/flask-canary-app
      - aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $REPOSITORY_URI

  build:
    commands:
      - echo Build started
      - docker build -t flask-canary-app .
      - docker tag flask-canary-app:latest $REPOSITORY_URI:latest

  post_build:
    commands:
      - echo Pushing image to ECR
      - docker push $REPOSITORY_URI:latest
      - echo Build completed

artifacts:
  files:
    - '**/*'
